[project]
name = "shared"
version = "0.1.0"
description = "Shared utilities for backend apps"
requires-python = ">=3.10, <3.11"
dependencies = [
    "toolkit",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*"]

[tool.uv.sources]
toolkit = { git = "https://github.com/pannet1/toolkit", rev = "e66bc1f" }
